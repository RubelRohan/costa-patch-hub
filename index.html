<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Costa MK Patch Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #F6F2EF; font-family: system-ui, sans-serif; }
    .btn { background: #6F263D; color: white; padding: 16px; border-radius: 9999px; font-weight: 600; }
  </style>
</head>
<body class="p-6 max-w-md mx-auto">

  <div id="login-screen">
    <div class="text-center mb-10">
      <span class="text-6xl">☕</span>
      <h1 class="text-3xl font-bold mt-4 text-[#6F263D]">Costa MK Patch Hub</h1>
    </div>
    <input id="username" value="admin" placeholder="Username" class="w-full p-4 border rounded-2xl mb-4">
    <input id="password" value="admin" type="password" placeholder="Password" class="w-full p-4 border rounded-2xl mb-6">
    <button onclick="login()" class="btn w-full">Login</button>
    <div id="status" class="mt-4 text-center text-sm min-h-[24px]"></div>
  </div>

  <div id="main-app" class="hidden text-center py-12">
    <h2 class="text-3xl font-bold text-green-600">✅ Login Successful!</h2>
    <p id="welcome" class="mt-6 text-lg"></p>
  </div>

<script>
  const API_BASE = window.location.origin;

  async function login() {
    const username = document.getElementById('username').value.trim().toLowerCase();
    const password = document.getElementById('password').value;
    const status = document.getElementById('status');

    status.innerHTML = '🔄 Connecting to server...';

    try {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 10000); // 10 second timeout

      const response = await fetch(API_BASE + '/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
        signal: controller.signal
      });

      clearTimeout(timeout);

      const data = await response.json();
      console.log("Server Response:", data);

      if (data.success) {
        status.innerHTML = '✅ Login Successful!';
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('main-app').classList.remove('hidden');
        document.getElementById('welcome').innerHTML = `Welcome, <strong>${data.user.name || username}</strong>!`;
      } else {
        status.innerHTML = `❌ ${data.message || 'Login Failed'}`;
      }
    } catch (err) {
      console.error(err);
      if (err.name === 'AbortError') {
        status.innerHTML = '❌ Request timed out. Server may be sleeping.';
      } else {
        status.innerHTML = `❌ Connection Error<br><small>${err.message}</small>`;
      }
    }
  }
</script>
</body>
</html>
