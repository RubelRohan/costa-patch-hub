<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Costa MK Patch Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #F6F2EF; }
    .btn { background: #6F263D; color: white; padding: 16px; border-radius: 9999px; font-weight: 600; }
  </style>
</head>
<body class="p-6">

<div class="max-w-md mx-auto">
  <div id="login-screen">
    <div class="text-center mb-10">
      <span class="text-6xl">☕</span>
      <h1 class="text-3xl font-bold mt-4 text-[#6F263D]">Costa MK Patch Hub</h1>
    </div>
    <input id="username" placeholder="Username" class="w-full p-4 border rounded-2xl mb-4 text-lg">
    <input id="password" type="password" placeholder="Password" class="w-full p-4 border rounded-2xl mb-6 text-lg">
    <button onclick="login()" class="btn w-full">Login</button>
    <p class="text-center text-sm text-gray-500 mt-6">Demo: admin / admin</p>
  </div>

  <div id="main-app" class="hidden text-center">
    <h2 class="text-2xl font-bold text-green-600 mt-10">Login Successful! 🎉</h2>
    <p id="welcome" class="mt-4"></p>
    <button onclick="logout()" class="mt-8 text-red-600">Logout</button>
  </div>
</div>

<script>
  const API_BASE = window.location.origin;

  async function login() {
    const username = document.getElementById('username').value.trim().toLowerCase();
    const password = document.getElementById('password').value;

    console.log("Attempting login to:", API_BASE + "/login");

    try {
      const res = await fetch(API_BASE + '/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      const data = await res.json();
      console.log("Response from server:", data);

      if (data.success) {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('main-app').classList.remove('hidden');
        document.getElementById('welcome').innerHTML = `Welcome, <strong>${data.user.name || username}</strong>!`;
      } else {
        alert(data.message || "Login failed");
      }
    } catch (err) {
      console.error(err);
      alert("Connection failed. Check Render Logs.");
    }
  }

  function logout() {
    location.reload();
  }
</script>
</body>
</html>
