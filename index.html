<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Costa MK Patch Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #F6F2EF; font-family: system-ui; }
    .btn { background: #6F263D; color: white; padding: 16px; border-radius: 12px; font-weight: 600; }
  </style>
</head>
<body class="p-6 max-w-md mx-auto">

  <div id="login-screen">
    <div class="text-center mb-10">
      <span class="text-6xl">☕</span>
      <h1 class="text-3xl font-bold text-[#6F263D] mt-4">Costa MK Patch Hub</h1>
    </div>
    <input id="username" placeholder="Username" class="w-full p-4 border rounded-2xl mb-4" value="admin">
    <input id="password" type="password" placeholder="Password" class="w-full p-4 border rounded-2xl mb-6" value="admin">
    <button onclick="login()" class="btn w-full">Login</button>
    <p class="text-center text-xs text-gray-500 mt-6">Demo: admin / admin</p>
  </div>

  <div id="main-app" class="hidden text-center py-10">
    <h2 class="text-2xl font-bold text-green-600">✅ Login Successful!</h2>
    <p id="welcome-name" class="mt-4 text-lg"></p>
  </div>

  <div id="error-log" class="mt-8 text-xs text-red-600"></div>

<script>
  const API_BASE = window.location.origin;

  async function login() {
    const username = document.getElementById('username').value.trim().toLowerCase();
    const password = document.getElementById('password').value;
    const errorLog = document.getElementById('error-log');

    errorLog.innerHTML = "Attempting login...";

    try {
      const res = await fetch(API_BASE + '/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      const data = await res.json();
      console.log("Server Response:", data);

      if (data.success) {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('main-app').classList.remove('hidden');
        document.getElementById('welcome-name').textContent = `Welcome, ${data.user.name || username}!`;
      } else {
        errorLog.innerHTML = `❌ Login Failed: ${data.message || 'Invalid credentials'}`;
      }
    } catch (err) {
      console.error(err);
      errorLog.innerHTML = `❌ Connection Error: ${err.message}<br>API_BASE: ${API_BASE}`;
    }
  }

  // Auto try with demo credentials after 1 second (for testing)
  setTimeout(() => {
    if (document.getElementById('login-screen').style.display !== 'none') {
      console.log("Auto-testing login...");
    }
  }, 1000);
</script>
</body>
</html>
