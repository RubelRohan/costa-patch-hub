<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#6F263D">
  <title>Costa MK Patch Hub</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  
  <style>
    :root {
      --costa-primary: #6F263D;
      --costa-secondary: #8B3A56;
      --costa-bg: #F6F2EF;
    }
    body { background-color: var(--costa-bg); font-family: 'Segoe UI', sans-serif; }
    .btn-costa { background-color: var(--costa-primary); color: white; }
    .btn-costa:hover { background-color: var(--costa-secondary); }
    .card { background: white; border: 1px solid #e5d9d0; }
  </style>
</head>
<body class="min-h-screen">

<div class="max-w-7xl mx-auto p-6">
  <!-- Header -->
  <div class="flex justify-between items-center mb-8">
    <div class="flex items-center gap-3">
      <span class="text-4xl">☕</span>
      <h1 class="text-3xl font-bold" style="color: var(--costa-primary);">Costa MK Patch Hub</h1>
    </div>
    <div id="user-info" class="font-semibold text-lg" style="color: var(--costa-primary);"></div>
  </div>

  <!-- Login Screen -->
  <div id="login-screen" class="max-w-md mx-auto bg-white rounded-3xl shadow-xl p-10">
    <div class="text-center mb-8">
      <span class="text-6xl">☕</span>
      <h2 class="text-3xl font-bold mt-4" style="color: var(--costa-primary);">Welcome Back</h2>
      <p class="text-gray-600 mt-2">Milton Keynes Patch</p>
    </div>
    <input id="username" placeholder="Username" class="w-full p-4 border rounded-2xl mb-4">
    <input id="password" type="password" placeholder="Password" class="w-full p-4 border rounded-2xl mb-6">
    <button onclick="login()" class="btn-costa w-full py-4 rounded-2xl font-semibold text-lg">Login</button>
    <p class="text-center text-xs text-gray-500 mt-6">Demo: admin / admin</p>
  </div>

  <!-- Main App -->
  <div id="main-app" class="hidden">
    <div class="flex gap-2 mb-8 border-b pb-3 overflow-x-auto">
      <button onclick="showTab(0)" class="tab-btn px-6 py-3 font-medium tab-active">Dashboard</button>
      <button onclick="showTab(1)" class="tab-btn px-6 py-3 font-medium">New Entry</button>
      <button onclick="showTab(2)" class="tab-btn px-6 py-3 font-medium">My History</button>
      <button onclick="showTab(3)" class="tab-btn px-6 py-3 font-medium" id="admin-tab">Admin</button>
    </div>

    <!-- Dashboard -->
    <div id="tab-0">
      <h2 class="text-2xl font-bold mb-6" style="color: var(--costa-primary);">Patch Overview</h2>
      <div id="dashboard-content" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

    <!-- New Entry -->
    <div id="tab-1" class="hidden">
      <h2 class="text-2xl font-bold mb-6" style="color: var(--costa-primary);">New Weekly Entry</h2>
      <div class="card rounded-3xl shadow p-8">
        <textarea id="entry-text" rows="10" class="w-full p-4 border rounded-2xl" placeholder="Write your achievements, challenges, risks, opportunities, and solutions..."></textarea>
        <button onclick="saveEntry()" class="btn-costa mt-6 w-full py-4 rounded-2xl font-semibold">Submit Entry</button>
      </div>
    </div>

    <!-- My History -->
    <div id="tab-2" class="hidden">
      <h2 class="text-2xl font-bold mb-6" style="color: var(--costa-primary);">My Previous Entries</h2>
      <div id="my-entries" class="space-y-6"></div>
    </div>

    <!-- Admin -->
    <div id="tab-3" class="hidden">
      <h2 class="text-2xl font-bold mb-6" style="color: var(--costa-primary);">Admin Panel</h2>
      <p>Admin features available.</p>
    </div>
  </div>
</div>

<script>
  const API_BASE = window.location.origin;

  let currentUser = null;
  let allEntries = [];

  async function login() {
    const username = document.getElementById('username').value.trim().toLowerCase();
    const password = document.getElementById('password').value;

    try {
      const result = await fetch(API_BASE + '/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await result.json();

      if (data.success) {
        currentUser = data.user;
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('main-app').classList.remove('hidden');
        document.getElementById('user-info').textContent = currentUser.name;
        loadDashboard();
      } else {
        alert("Invalid credentials! Try admin / admin");
      }
    } catch (e) {
      alert("Cannot connect to server. Please check if server is running.");
      console.error(e);
    }
  }

  async function loadDashboard() {
    try {
      const res = await fetch(API_BASE + '/entries');
      allEntries = await res.json();
      
      const container = document.getElementById('dashboard-content');
      container.innerHTML = '<p class="text-gray-500">Welcome! Data loaded successfully.</p>';
    } catch (e) {
      console.error(e);
    }
  }

  async function saveEntry() {
    const text = document.getElementById('entry-text').value.trim();
    if (!text) return alert("Please write something");

    try {
      await fetch(API_BASE + '/entry', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          storeId: currentUser.storeId || 1,
          manager: currentUser.name,
          achievements: text,
          challenges: "",
          risks: "",
          opportunities: "",
          solutions: ""
        })
      });
      alert("✅ Entry submitted successfully!");
      document.getElementById('entry-text').value = '';
      loadDashboard();
    } catch (e) {
      alert("Failed to save entry");
    }
  }

  function showTab(n) {
    document.querySelectorAll('#main-app > div[id^="tab-"]').forEach(div => div.classList.add('hidden'));
    document.getElementById(`tab-${n}`).classList.remove('hidden');
  }

  // Keyboard support
  document.getElementById('password').addEventListener('keypress', e => {
    if (e.key === 'Enter') login();
  });

  console.log("✅ Costa MK Patch Hub initialized with API_BASE:", API_BASE);
</script>
</body>
</html>
